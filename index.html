<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NIO • Atendimento Seguro</title>
  <link rel="stylesheet" href="./assets/style.css" />
</head>
<body>
  <main class="page">
    <section class="panel" role="region" aria-label="Atendimento Seguro">
      <div class="panel-topline" aria-hidden="true"></div>

      <div class="brand">
        <div class="brand-badge">
          <div class="brand-inner">
            <img src="./assets/logo.png" alt="NIO" class="brand-logo" />
          </div>
          <span class="brand-check" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="16" height="16">
              <path fill="currentColor" d="M9 16.2 4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4z"/>
            </svg>
          </span>
        </div>
      </div>

      <div class="box">
        <h1>Tudo pronto para começar!</h1>
        <p class="box-sub">
          Confira abaixo o serviço selecionado antes de iniciar o atendimento seguro.
        </p>

        <div class="box-selected">
          <div class="box-label">Serviço Selecionado:</div>
          <div class="box-value" id="selectedService">—</div>
        </div>
      </div>

      <div class="services">
        <button class="srv" type="button" data-service="2ª via de boleto">
          <div class="srv-title">2ª via de boleto</div>
          <div class="srv-desc">Emissão e envio de boleto ou código de barras.</div>
        </button>

        <button class="srv" type="button" data-service="Suporte técnico">
          <div class="srv-title">Suporte técnico</div>
          <div class="srv-desc">Problemas de conexão, instabilidade e orientações.</div>
        </button>

        <button class="srv" type="button" data-service="Outros assuntos">
          <div class="srv-title">Outros assuntos</div>
          <div class="srv-desc">Dúvidas gerais e solicitações diversas.</div>
        </button>
      </div>

      <button class="cta" id="btnStart" type="button">
        <span class="cta-ico" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="18" height="18">
            <path fill="currentColor" d="M20 2H4C2.9 2 2 2.9 2 4v12c0 1.1.9 2 2 2h3v3l4-3h9c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
          </svg>
        </span>
        <span>Iniciar Atendimento Seguro</span>
      </button>

      <button class="link" id="btnClear" type="button">Voltar e escolher outro serviço</button>

      <footer class="foot">
        © <span id="year"></span> NIO. Todos os direitos reservados.
      </footer>
    </section>
  </main>

  <script src="./assets/app.js"></script>
</body>
</html>
